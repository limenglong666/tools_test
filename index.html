<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0c0e12;
      --surface: #141820;
      --border: #2a3140;
      --text: #e8ecf4;
      --muted: #8b95a8;
      --accent: #3d8bfd;
      --accent-dim: rgba(61, 139, 253, 0.12);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Instrument Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(61, 139, 253, 0.1), transparent);
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.25rem 4rem;
    }
    header {
      margin-bottom: 2.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem;
    }
    .sub {
      color: var(--muted);
      font-size: 1rem;
      margin: 0;
    }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .tool-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
    }
    .tool-card:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
    }
    .tool-card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      color: var(--accent);
    }
    .tool-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .tool-path {
      margin-top: 0.65rem;
      font-family: ui-monospace, monospace;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tools</h1>
      <p class="sub">汇集各类实用小工具，一个工具一个文件夹。</p>
    </header>

    <div class="tools">
      <a class="tool-card" href="ethereum-eip712/">
        <h2>EIP-712 Debugger</h2>
        <p>在以太坊 / EVM 链上调试 typed data 签名：编辑载荷、计算 digest、钱包签名与链下验签。</p>
        <div class="tool-path">ethereum-eip712/</div>
      </a>
      <a class="tool-card" href="browser-table-compare/">
        <h2>Browser ↔ Table Compare</h2>
        <p>CSV 中验证器 CL Rewards 与 beaconcha.in Validator History（按 Epoch）对比。</p>
        <div class="tool-path">browser-table-compare/</div>
      </a>
    </div>
  </div>
</body>
</html>
